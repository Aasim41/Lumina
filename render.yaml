databases:
  - name: smart-expense-db
    plan: free
    databaseName: smart_expense
    user: expense_user
    ipAllowList: []

services:
  - type: web
    name: smart-expense-api
    plan: free
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-expense-db
          property: connectionString
        # Render provides postgres:// but we need postgresql+asyncpg://
        # Use the internal connection string and modify in app/config.py
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12"

