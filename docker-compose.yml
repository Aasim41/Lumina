services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smart_expense
      POSTGRES_USER: expense_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-expense_secret_2024}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expense_user -d smart_expense"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://expense_user:${DB_PASSWORD:-expense_secret_2024}@db:5432/smart_expense
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-dev-mode}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-dev-mode}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
